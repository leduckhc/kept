name: Desktop Package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  KEPT_MACOS_VERSION: "0.1.0"

jobs:
  macos-apple-silicon:
    name: macOS Apple Silicon package
    runs-on: macos-26
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Confirm Apple Silicon runner
        run: |
          uname -m
          test "$(uname -m)" = "arm64"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        run: npm ci

      - name: Verify web workspace
        run: npm run verify

      - name: Validate Gmail OAuth release env
        env:
          KEPT_GMAIL_CLIENT_ID: ${{ vars.KEPT_GMAIL_CLIENT_ID || secrets.KEPT_GMAIL_CLIENT_ID }}
          KEPT_GMAIL_CLIENT_SECRET: ${{ secrets.KEPT_GMAIL_CLIENT_SECRET || secrets.GMAIL_CLIENT_SECRET }}
          KEPT_GMAIL_REDIRECT_URI: http://127.0.0.1:49210/oauth/google/callback
        run: |
          set -euo pipefail
          test -n "${KEPT_GMAIL_CLIENT_ID:-}" || { echo "Missing KEPT_GMAIL_CLIENT_ID"; exit 1; }
          test -n "${KEPT_GMAIL_CLIENT_SECRET:-}" || { echo "Missing KEPT_GMAIL_CLIENT_SECRET"; exit 1; }
          test -n "${KEPT_GMAIL_REDIRECT_URI:-}" || { echo "Missing KEPT_GMAIL_REDIRECT_URI"; exit 1; }
          echo "Gmail OAuth release env present. clientIdTail=${KEPT_GMAIL_CLIENT_ID: -8} clientSecretPresent=true redirect=${KEPT_GMAIL_REDIRECT_URI}"

      - name: Build Kept desktop package
        env:
          KEPT_GMAIL_CLIENT_ID: ${{ vars.KEPT_GMAIL_CLIENT_ID || secrets.KEPT_GMAIL_CLIENT_ID }}
          KEPT_GMAIL_CLIENT_SECRET: ${{ secrets.KEPT_GMAIL_CLIENT_SECRET || secrets.GMAIL_CLIENT_SECRET }}
          KEPT_GMAIL_REDIRECT_URI: http://127.0.0.1:49210/oauth/google/callback
        run: npm run tauri:build

      - name: Ad-hoc sign and repackage runnable macOS alpha
        run: |
          set -euo pipefail
          APP_PATH="$(find apps/desktop/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          test -n "$APP_PATH"

          codesign --force --deep --sign - "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

          DMG_DIR="apps/desktop/src-tauri/target/release/bundle/dmg"
          ZIP_DIR="apps/desktop/src-tauri/target/release/bundle/zip"
          mkdir -p "$DMG_DIR" "$ZIP_DIR"
          rm -f "$DMG_DIR"/*.dmg "$ZIP_DIR"/*.zip

          DMG_PATH="$DMG_DIR/Kept_${KEPT_MACOS_VERSION}_aarch64.dmg"
          hdiutil create -volname "Kept" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
          hdiutil verify "$DMG_PATH"

          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_DIR/Kept_${KEPT_MACOS_VERSION}_aarch64.app.zip"

          cat > "$ZIP_DIR/README-macos-alpha.txt" <<'EOF'
          Kept macOS Apple Silicon alpha

          This build is ad-hoc signed for internal alpha testing, but it is not Apple notarized yet.

          Preferred install:
          1. Open Kept_0.1.0_aarch64.dmg.
          2. Drag Kept.app to Applications.
          3. If macOS blocks the app, right-click Kept.app and choose Open.

          If macOS says the app is damaged or cannot be opened, remove the quarantine attribute:

              xattr -dr com.apple.quarantine /Applications/Kept.app
              open /Applications/Kept.app

          Fallback:
          - Download Kept_0.1.0_aarch64.app.zip, unzip it, move Kept.app to Applications, then run the same xattr command if needed.
          EOF

          ls -lah "$APP_PATH" "$DMG_PATH" "$ZIP_DIR"

      - name: Upload macOS Apple Silicon app bundle
        uses: actions/upload-artifact@v6
        with:
          name: Kept-macos-apple-silicon-app
          path: apps/desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error

      - name: Upload macOS Apple Silicon DMG
        uses: actions/upload-artifact@v6
        with:
          name: Kept-macos-apple-silicon-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS Apple Silicon app zip
        uses: actions/upload-artifact@v6
        with:
          name: Kept-macos-apple-silicon-app-zip
          path: |
            apps/desktop/src-tauri/target/release/bundle/zip/*.zip
            apps/desktop/src-tauri/target/release/bundle/zip/README-macos-alpha.txt
          if-no-files-found: error
