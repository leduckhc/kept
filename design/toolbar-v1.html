<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kept Toolbar — V1 Minimal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-hover: #222;
  --border: #1e1e1e;
  --text: #e8e8e8;
  --text-muted: #888;
  --accent: #7c6fd4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; padding: 40px; }
.state-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; margin-top: 32px; }
.state-label:first-child { margin-top: 0; }

/* Toolbar base */
.toolbar {
  height: 48px;
  width: 100%;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
}
.toolbar svg { width: 18px; height: 18px; stroke: var(--text-muted); stroke-width: 1.5; fill: none; }
.toolbar button {
  background: none; border: 1px solid transparent; color: var(--text-muted);
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-size: 13px; font-family: inherit; padding: 6px 10px; border-radius: 6px;
  transition: all 0.15s;
}
.toolbar button:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border); }
.toolbar button:hover svg { stroke: var(--text); }
.toolbar button.accent { color: var(--accent); border-color: var(--accent); }
.toolbar button.accent svg { stroke: var(--accent); }
.toolbar button.accent:hover { background: rgba(124,111,212,0.1); }

/* View name */
.view-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }

/* Search */
.search-wrap {
  flex: 1; max-width: 400px; margin: 0 auto; position: relative; display: flex; align-items: center;
}
.search-wrap input {
  width: 100%; height: 32px; background: transparent; border: 1px solid var(--border);
  border-radius: 6px; padding: 0 12px 0 34px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none; transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap .search-icon { position: absolute; left: 10px; pointer-events: none; }
.search-wrap .search-icon svg { width: 16px; height: 16px; stroke: var(--text-muted); }

/* Right group */
.right-group { display: flex; align-items: center; gap: 4px; margin-left: auto; }

/* Bulk selection */
.selected-count { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; }

/* Mobile container */
.mobile-wrap { width: 400px; overflow: hidden; }
.mobile-wrap .toolbar { padding: 0 10px; gap: 8px; }
.mobile-wrap .search-wrap { max-width: none; }

/* Search focused */
.search-focused .search-wrap { flex: 1; max-width: none; margin: 0; }
.search-focused .search-wrap input { padding-left: 12px; }
</style>
</head>
<body>

<p class="state-label">1. Default — Browsing Inbox</p>
<div class="toolbar">
  <span class="view-name">Inbox</span>
  <div class="search-wrap">
    <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
    <input type="text" placeholder="Search emails…">
  </div>
  <div class="right-group">
    <button title="Focus Mode">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    </button>
    <button class="accent" title="Compose">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Compose</span>
    </button>
  </div>
</div>

<p class="state-label">2. Bulk Selection — 3 items selected</p>
<div class="toolbar">
  <button title="Cancel selection">
    <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
  </button>
  <span class="selected-count">3 selected</span>
  <div class="right-group">
    <button>
      <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 8 8 5.2a2 2 0 0 0 4 0L22 8"/></svg>
      <span>Archive</span>
    </button>
    <button>
      <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      <span>Trash</span>
    </button>
    <button>
      <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="M2 4c0-1.1.9-2 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-5l-5 4v-4H4a2 2 0 0 1-2-2V4z"/></svg>
      <span>Mark Read</span>
    </button>
  </div>
</div>

<p class="state-label">3. Mobile (≤400px container)</p>
<div class="mobile-wrap">
  <div class="toolbar">
    <button title="Menu">
      <svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
    </button>
    <div class="search-wrap">
      <span class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
      <input type="text" placeholder="Search…">
    </div>
    <button class="accent" title="Compose">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  </div>
</div>

<p class="state-label">4. Search Focused</p>
<div class="toolbar search-focused">
  <button title="Back">
    <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <div class="search-wrap">
    <input type="text" placeholder="Search emails…" value="project updates" autofocus>
  </div>
  <button title="Clear">
    <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
  </button>
</div>

</body>
</html>
