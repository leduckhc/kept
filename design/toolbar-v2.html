<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kept Toolbar — V2 Cozy Pill</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-hover: #222;
  --border: #1e1e1e;
  --text: #e8e8e8;
  --text-muted: #888;
  --accent: #7c6fd4;
  --accent-dim: rgba(124,111,212,0.15);
  --danger: #d45f5f;
  --danger-dim: rgba(212,95,95,0.15);
  --success: #5fad6b;
  --success-dim: rgba(95,173,107,0.15);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; padding: 40px; }
.state-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; margin-top: 32px; }
.state-label:first-child { margin-top: 0; }

.toolbar {
  height: 48px;
  width: 100%;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
}
.toolbar svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.75; fill: none; }

/* Pill button base */
.pill {
  background: none; border: 1px solid var(--border); color: var(--text-muted);
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; font-family: inherit;
  padding: 6px 14px; border-radius: 20px; transition: all 0.15s; white-space: nowrap;
}
.pill:hover { background: var(--surface-hover); color: var(--text); border-color: #333; }
.pill.compose { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.pill.compose:hover { background: var(--accent); color: #fff; }
.pill.archive { background: var(--success-dim); border-color: var(--success); color: var(--success); }
.pill.trash { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
.pill.mark-read { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.pill.icon-only { padding: 6px 8px; }

.view-name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; }

/* Search pill */
.search-wrap {
  flex: 1; max-width: 380px; margin: 0 auto; position: relative; display: flex; align-items: center;
}
.search-wrap input {
  width: 100%; height: 34px; background: var(--bg); border: 1px solid var(--border);
  border-radius: 20px; padding: 0 14px 0 36px; font-size: 13px; color: var(--text);
  font-family: inherit; outline: none; transition: all 0.15s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap .s-icon { position: absolute; left: 12px; pointer-events: none; color: var(--text-muted); display: flex; }

.right-group { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.selected-count { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; padding-left: 4px; }

.mobile-wrap { width: 400px; overflow: hidden; }
.mobile-wrap .toolbar { padding: 0 10px; gap: 8px; }
.mobile-wrap .search-wrap { max-width: none; }

.search-focused .search-wrap { flex: 1; max-width: none; margin: 0; }
.search-focused .search-wrap input { padding-left: 14px; }
</style>
</head>
<body>

<p class="state-label">1. Default — Browsing Inbox</p>
<div class="toolbar">
  <span class="view-name">Inbox</span>
  <div class="search-wrap">
    <span class="s-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
    <input type="text" placeholder="Search emails…">
  </div>
  <div class="right-group">
    <button class="pill icon-only" title="Focus Mode">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
    </button>
    <button class="pill compose" title="Compose">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      <span>Compose</span>
    </button>
  </div>
</div>

<p class="state-label">2. Bulk Selection — 3 items selected</p>
<div class="toolbar">
  <button class="pill icon-only" title="Cancel">
    <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
  </button>
  <span class="selected-count">3 selected</span>
  <div class="right-group">
    <button class="pill archive">
      <svg viewBox="0 0 24 24"><path d="m21 8-2-3H5L3 8"/><rect x="3" y="8" width="18" height="12" rx="1"/><path d="M10 12h4"/></svg>
      <span>Archive</span>
    </button>
    <button class="pill trash">
      <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
      <span>Trash</span>
    </button>
    <button class="pill mark-read">
      <svg viewBox="0 0 24 24"><path d="M22 13V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h9"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><path d="m16 19 2 2 4-4"/></svg>
      <span>Mark Read</span>
    </button>
  </div>
</div>

<p class="state-label">3. Mobile (≤400px container)</p>
<div class="mobile-wrap">
  <div class="toolbar">
    <button class="pill icon-only" title="Menu">
      <svg viewBox="0 0 24 24"><path d="M4 6h16"/><path d="M4 12h16"/><path d="M4 18h16"/></svg>
    </button>
    <div class="search-wrap">
      <span class="s-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span>
      <input type="text" placeholder="Search…">
    </div>
    <button class="pill compose icon-only" title="Compose">
      <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  </div>
</div>

<p class="state-label">4. Search Focused</p>
<div class="toolbar search-focused">
  <button class="pill icon-only" title="Back">
    <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <div class="search-wrap">
    <input type="text" placeholder="Search emails…" value="meeting notes">
  </div>
  <button class="pill icon-only" title="Clear">
    <svg viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
  </button>
</div>

</body>
</html>
