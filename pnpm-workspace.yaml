packages:
  - '.'

# --- Supply Chain Hardening ---

# Only these packages may run install/build scripts
allowBuilds:
  esbuild: true
  '@tauri-apps/cli': true
  better-sqlite3: true
  simple-git-hooks: true

# Fail if unreviewed packages have install scripts
strictDepBuilds: true

# Block git/tarball URLs in transitive dependencies
blockExoticSubdeps: true

# 3-day cooldown (minutes) — blocks freshly published malware
minimumReleaseAge: 4320

# Reject packages whose trust attestation level decreased
trustPolicy: no-downgrade

# Force semver@7 — Babel 7 pins ^6.3.1 which lacks provenance attestation.
# semver 7 is API-compatible for the range/compare calls Babel uses.
overrides:
  semver: ^7.8.1


